name: Build APK

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths:
      - "Android/**"
      - ".github/workflows/build_android.yaml"
  pull_request:
    branches: ["main"]
    paths:
      - "Android/**"

permissions:
  contents: write # needed to attach the APK to a Release on tags

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Android/src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK platform 37
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-37.0" "platform-tools"

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Name the APK
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/RIN.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RIN-APK
          path: Android/src/app/build/outputs/apk/debug/RIN.apk
          if-no-files-found: error

      - name: Attach APK to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Android/src/app/build/outputs/apk/debug/RIN.apk
          generate_release_notes: true
