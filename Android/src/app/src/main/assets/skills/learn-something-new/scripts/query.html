<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <script>
      window["ai_edge_gallery_get_result"] = async function (data) {
        try {
          let params;
          try {
            params = typeof data === "string" ? JSON.parse(data) : data;
          } catch (e) {
            params = {};
          }

          const topic = params.topic || "Unknown";
          const lang = params.lang || "en";
          const baseUrl = `https://${lang}.wikipedia.org/w/api.php`;
          const searchParams = new URLSearchParams({
            action: "query",
            format: "json",
            generator: "search",
            gsrsearch: topic,
            gsrlimit: "1",
            prop: "extracts",
            explaintext: "1",
            exintro: "1",
            origin: "*",
          });
          const searchRes = await fetch(`${baseUrl}?${searchParams.toString()}`);
          if (!searchRes.ok) throw new Error(`HTTP error! status: ${searchRes.status}`);
          const searchData = await searchRes.json();
          if (!searchData.query || !searchData.query.pages) {
            console.warn("[learn-something-new/query.html] Wikipedia lookup returned empty structure. Yielding 'Not found'.");
            return JSON.stringify({ result: "Not found" });
          }
          const pages = searchData.query.pages;
          const page = pages[Object.keys(pages)[0]];

          const responsePayload = JSON.stringify({
            result: JSON.stringify({
              title: page.title,
              extract: page.extract,
            }),
          });
          console.log("[learn-something-new/query.html] Yielding extracted Wikipedia result payload back to model engine:", responsePayload);
          return responsePayload;
        } catch (err) {
          return JSON.stringify({ error: err.message });
        }
      };
    </script>
  </body>
</html>
